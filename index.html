<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/25/25231.png">

    <title>LMU PRO OS</title>

    <style>
        body {
            margin: 0; padding: 0; background-color: #020617;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-user-select: none; user-select: none;
            overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent;
        }
        input, textarea { -webkit-user-select: auto; user-select: auto; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ✅ 에러 해결 포인트: 아이콘을 안전하게 가져오기
        const { 
            Plus, History, Dumbbell, CheckCircle2, Trash2, ChevronLeft, ChevronRight, 
            TrendingUp, Utensils, User, Droplets, Search, X, Calendar, 
            Award, Zap, Target, Flame, Settings, Save, Scale, Ruler, Activity, RotateCcw,
            Sparkles, MessageSquare, BrainCircuit 
        } = lucide;

        // 리액트 훅 가져오기
        const { useState, useEffect, useMemo } = React;

        const apiKey = "AIzaSyD_9qv1eJT0hOkBDel5cI-DTq_CMGhw2uM";

        // --- 데이터베이스 ---
        const EXERCISE_METRICS = {
            "벤치 프레스": { part: "가슴", efficiency: 95 },
            "스쿼트": { part: "하체", efficiency: 100 },
            "데드리프트": { part: "전신/등", efficiency: 98 },
            "풀업": { part: "등", efficiency: 92 },
            "밀리터리 프레스": { part: "어깨", efficiency: 90 },
            "인클라인 덤벨 프레스": { part: "가슴(상부)", efficiency: 88 },
            "랫풀다운": { part: "등", efficiency: 85 },
            "바벨 로우": { part: "등", efficiency: 88 },
            "레그 프레스": { part: "하체", efficiency: 82 },
            "사이드 레터럴 레이즈": { part: "어깨(측면)", efficiency: 75 },
            "딥스": { part: "가슴/삼두", efficiency: 86 },
            "케이블 푸쉬다운": { part: "삼두", efficiency: 70 },
            "바벨 컬": { part: "이두", efficiency: 72 }
        };

        const DEFAULT_ROUTINES = {
            "가슴 & 삼두 (A)": ["벤치 프레스", "인클라인 덤벨 프레스", "딥스", "케이블 푸쉬다운"],
            "등 & 이두 (B)": ["풀업", "바벨 로우", "랫풀다운", "바벨 컬"],
            "하체 & 어깨 (C)": ["스쿼트", "레그 프레스", "밀리터리 프레스", "사이드 레터럴 레이즈"]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('today');
            const [selectedRoutine, setSelectedRoutine] = useState(null);
            const [workoutData, setWorkoutData] = useState([]);
            const [savedLogs, setSavedLogs] = useState([]);
            const [foodLogs, setFoodLogs] = useState([]);
            const [waterLogs, setWaterLogs] = useState({});
            const [weightHistory, setWeightHistory] = useState([]);
            const [profile, setProfile] = useState({ 
                height: 180, weight: 62.0, goalWeight: 67.0, muscle: 32.0, waterGoal: 3000 
            });
            const [isAddingExercise, setIsAddingExercise] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [foodInput, setFoodInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [currentCalendarDate, setCurrentCalendarDate] = useState(new Date());
            const [coachingTip, setCoachingTip] = useState("");
            const [mealSuggestion, setMealSuggestion] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);

            const todayKey = new Date().toISOString().split('T')[0];

            // 데이터 로드
            useEffect(() => {
                const logs = localStorage.getItem('lmu_v6_logs');
                if (logs) setSavedLogs(JSON.parse(logs));
                const foods = localStorage.getItem('lmu_v6_foods');
                if (foods) setFoodLogs(JSON.parse(foods));
                const water = localStorage.getItem('lmu_v6_water');
                if (water) setWaterLogs(JSON.parse(water));
            }, []);

            // 데이터 저장
            useEffect(() => {
                localStorage.setItem('lmu_v6_logs', JSON.stringify(savedLogs));
                localStorage.setItem('lmu_v6_foods', JSON.stringify(foodLogs));
                localStorage.setItem('lmu_v6_water', JSON.stringify(waterLogs));
            }, [savedLogs, foodLogs, waterLogs]);

            const dietGoal = useMemo(() => ({
                targetKcal: 2500, carbs: 312, protein: 124, fat: 55
            }), []);

            const todayFoodTotal = useMemo(() => {
                return foodLogs.filter(f => f.date === todayKey).reduce((a, b) => ({
                    kcal: a.kcal + b.kcal, carbs: a.carbs + b.carbs, protein: a.protein + b.protein, fat: a.fat + b.fat
                }), { kcal: 0, carbs: 0, protein: 0, fat: 0 });
            }, [foodLogs, todayKey]);

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans pb-32 max-w-md mx-auto relative overflow-x-hidden border-x border-slate-900 shadow-2xl">
                    <header className="p-5 bg-slate-900/95 backdrop-blur-md border-b border-slate-800 flex justify-between items-center sticky top-0 z-40">
                        <h1 className="text-xl font-black text-lime-400 italic flex items-center gap-2">LMU PRO <Sparkles size={16} /></h1>
                        <div className="text-right"><div className="text-sm font-black text-lime-400">{profile.weight}kg</div></div>
                    </header>

                    <main className="p-4 space-y-6">
                        {activeTab === 'today' && (
                            <div className="space-y-6">
                                {!selectedRoutine ? (
                                    <div className="space-y-4">
                                        <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800">
                                            <div className="flex items-center gap-3 mb-4"><Droplets className="text-blue-400" /> <span className="text-2xl font-black">{waterLogs[todayKey] || 0}ml</span></div>
                                            <button onClick={() => setWaterLogs({...waterLogs, [todayKey]: (waterLogs[todayKey]||0)+250})} className="w-full bg-blue-500/10 text-blue-400 py-3 rounded-xl font-black">+ 250ml</button>
                                        </div>
                                        {Object.keys(DEFAULT_ROUTINES).map(name => (
                                            <button key={name} onClick={() => {
                                                setSelectedRoutine(name);
                                                setWorkoutData(DEFAULT_ROUTINES[name].map(ex => ({ name: ex, sets: [{weight:'', reps:'', completed: false}] })));
                                            }} className="w-full p-6 bg-slate-900 border border-slate-800 rounded-[2rem] text-left font-black text-lg italic uppercase">{name}</button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <button onClick={() => setSelectedRoutine(null)} className="text-lime-400 font-black">← 뒤로가기</button>
                                        {workoutData.map((ex, idx) => <div key={idx} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 font-bold">{ex.name}</div>)}
                                        <button onClick={() => setSelectedRoutine(null)} className="w-full bg-lime-400 text-slate-950 py-4 rounded-3xl font-black uppercase">운동 완료</button>
                                    </div>
                                )}
                            </div>
                        )}
                        {activeTab === 'diet' && <div className="p-10 text-center font-black opacity-20 text-4xl italic">DIET MODULE</div>}
                        {activeTab === 'history' && <div className="p-10 text-center font-black opacity-20 text-4xl italic">LOGS MODULE</div>}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900/95 backdrop-blur-3xl border border-slate-800 p-2 rounded-[2.5rem] flex justify-around items-center z-50">
                        <button onClick={() => setActiveTab('today')} className={`p-4 rounded-3xl ${activeTab === 'today' ? 'bg-lime-400 text-slate-950' : 'text-slate-600'}`}><Dumbbell size={20}/></button>
                        <button onClick={() => setActiveTab('diet')} className={`p-4 rounded-3xl ${activeTab === 'diet' ? 'bg-lime-400 text-slate-950' : 'text-slate-600'}`}><Utensils size={20}/></button>
                        <button onClick={() => setActiveTab('history')} className={`p-4 rounded-3xl ${activeTab === 'history' ? 'bg-lime-400 text-slate-950' : 'text-slate-600'}`}><Award size={20}/></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
