<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LMU PRO OS</title>
    <!-- 라이브러리 로드: React 및 관련 도구 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide React UMD 버전을 사용하여 전역 변수 'Lucide' 확보 -->
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #020617; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // CDN에서 제공하는 Lucide 아이콘을 안전하게 추출
        // window.Lucide가 정의되어 있지 않을 경우를 대비해 빈 객체로 폴백 처리
        const LucideLib = window.Lucide || {};
        
        const { 
            Plus, History, Dumbbell, CheckCircle2, Trash2, ChevronLeft, ChevronRight, 
            TrendingUp, Utensils, User, Droplets, Search, X, Calendar: CalendarIcon, 
            Award, Zap, Target, Flame, Settings, Save, Scale, Ruler, Activity, RotateCcw,
            Sparkles, MessageSquare, BrainCircuit
        } = LucideLib;

        // Gemini API 키 (사용자가 직접 입력해야 함)
        const apiKey = ""; 

        const EXERCISE_METRICS = {
            "벤치 프레스": { part: "가슴", efficiency: 95, tip: "상체 프레스의 꽃, 중량 증가 필수" },
            "스쿼트": { part: "하체", efficiency: 100, tip: "전신 호르몬 분비 촉진, 린메스업 핵심" },
            "데드리프트": { part: "전신/등", efficiency: 98, tip: "후면 사슬 전체의 두께감 형성" },
            "풀업": { part: "등", efficiency: 92, tip: "넓은 어깨 프레임의 핵심" },
            "밀리터리 프레스": { part: "어깨", efficiency: 90, tip: "직각 어깨와 상체 안정성" },
            "인클라인 덤벨 프레스": { part: "가슴(상부)", efficiency: 88, tip: "윗가슴 볼륨업" },
            "랫풀다운": { part: "등", efficiency: 85, tip: "등의 너비 확장" },
            "바벨 로우": { part: "등", efficiency: 88, tip: "두꺼운 등 근육 형성" },
            "레그 프레스": { part: "하체", efficiency: 82, tip: "안전한 하체 과부하" },
            "사이드 레터럴 레이즈": { part: "어깨(측면)", efficiency: 75, tip: "측면 볼륨 극대화" },
            "딥스": { part: "가슴/삼두", efficiency: 86, tip: "아랫가슴 라인 정리" },
            "케이블 푸쉬다운": { part: "삼두", efficiency: 70, tip: "삼두 선명도 강화" },
            "바벨 컬": { part: "이두", efficiency: 72, tip: "팔 볼륨 증대" }
        };

        const DEFAULT_ROUTINES = {
            "가슴 & 삼두 (A)": ["벤치 프레스", "인클라인 덤벨 프레스", "딥스", "케이블 푸쉬다운"],
            "등 & 이두 (B)": ["풀업", "바벨 로우", "랫풀다운", "바벨 컬"],
            "하체 & 어깨 (C)": ["스쿼트", "레그 프레스", "밀리터리 프레스", "사이드 레터럴 레이즈"]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('today');
            const [selectedRoutine, setSelectedRoutine] = useState(null);
            const [workoutData, setWorkoutData] = useState([]);
            const [savedLogs, setSavedLogs] = useState([]);
            const [foodLogs, setFoodLogs] = useState([]);
            const [waterLogs, setWaterLogs] = useState({});
            const [weightHistory, setWeightHistory] = useState([]);
            const [profile, setProfile] = useState({ 
                height: 180, weight: 62.0, goalWeight: 67.0, muscle: 32.0, waterGoal: 3000 
            });
            
            const [isAddingExercise, setIsAddingExercise] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [foodInput, setFoodInput] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [currentCalendarDate, setCurrentCalendarDate] = useState(new Date());

            const [coachingTip, setCoachingTip] = useState("");
            const [mealSuggestion, setMealSuggestion] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);

            const getTodayKey = () => new Date().toISOString().split('T')[0];
            const todayKey = getTodayKey();

            const callGemini = async (prompt, systemInstruction = "") => {
                if (!apiKey) return "API 키를 설정에서 입력해주세요.";
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "답변을 생성할 수 없습니다.";
                } catch (error) {
                    return "AI 서비스를 이용할 수 없습니다.";
                }
            };

            const generateCoachingTip = async (workout) => {
                setIsAiLoading(true);
                const workoutStr = workout.map(ex => `${ex.name}: ${ex.sets.filter(s => s.completed).length}세트 완료`).join(', ');
                const prompt = `오늘 나의 운동 기록: ${workoutStr}. 목표는 5kg 린메스업. 피드백 줘.`;
                const tip = await callGemini(prompt, "보디빌딩 코치로서 짧고 강한 조언 한마디.");
                setCoachingTip(tip);
                setIsAiLoading(false);
            };

            const generateMealSuggestion = async () => {
                setIsAiLoading(true);
                const prompt = `남은 칼로리 ${dietGoal.targetKcal - todayFoodTotal.kcal}kcal. 추천 식단 하나만 알려줘.`;
                const suggestion = await callGemini(prompt, "영양사로서 린메스업 식단 추천.");
                setMealSuggestion(suggestion);
                setIsAiLoading(false);
            };

            useEffect(() => {
                const logs = localStorage.getItem('lmu_v6_logs');
                const foods = localStorage.getItem('lmu_v6_foods');
                const water = localStorage.getItem('lmu_v6_water');
                const prof = localStorage.getItem('lmu_v6_profile');
                const weightHist = localStorage.getItem('lmu_v6_weight_hist');
                if (logs) setSavedLogs(JSON.parse(logs));
                if (foods) setFoodLogs(JSON.parse(foods));
                if (water) setWaterLogs(JSON.parse(water));
                if (prof) setProfile(JSON.parse(prof));
                if (weightHist) setWeightHistory(JSON.parse(weightHist));
            }, []);

            useEffect(() => {
                localStorage.setItem('lmu_v6_logs', JSON.stringify(savedLogs));
                localStorage.setItem('lmu_v6_foods', JSON.stringify(foodLogs));
                localStorage.setItem('lmu_v6_water', JSON.stringify(waterLogs));
                localStorage.setItem('lmu_v6_profile', JSON.stringify(profile));
                localStorage.setItem('lmu_v6_weight_hist', JSON.stringify(weightHistory));
            }, [savedLogs, foodLogs, waterLogs, profile, weightHistory]);

            const dietGoal = useMemo(() => {
                const bmr = (10 * profile.weight) + (6.25 * profile.height) - (5 * 25) + 5;
                const tdee = bmr * 1.55;
                return {
                    targetKcal: Math.round(tdee + 300),
                    carbs: Math.round(((tdee + 300) * 0.5) / 4),
                    protein: Math.round(profile.weight * 2),
                    fat: Math.round(((tdee + 300) * 0.2) / 9)
                };
            }, [profile.weight, profile.height]);

            const todayFoodTotal = useMemo(() => {
                return foodLogs
                    .filter(f => f.date === todayKey)
                    .reduce((a, b) => ({ kcal: a.kcal + b.kcal, carbs: a.carbs + b.carbs, protein: a.protein + b.protein, fat: a.fat + b.fat }), { kcal: 0, carbs: 0, protein: 0, fat: 0 });
            }, [foodLogs, todayKey]);

            const renderCalendar = () => {
                const year = currentCalendarDate.getFullYear();
                const month = currentCalendarDate.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const lastDate = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(<div key={`empty-${i}`} className="h-16"></div>);
                for (let d = 1; d <= lastDate; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const hasWorkout = savedLogs.some(l => l.date === dateStr);
                    const dayWeight = weightHistory.find(h => h.date === dateStr)?.weight || (dateStr === todayKey ? profile.weight : null);
                    days.push(
                        <div key={`day-${d}`} className={`h-16 border border-slate-900 flex flex-col items-center justify-between p-1 relative ${dateStr === todayKey ? 'bg-lime-400/5' : ''}`}>
                            <span className={`text-[10px] font-bold ${dateStr === todayKey ? 'text-lime-400' : 'text-slate-500'}`}>{d}</span>
                            {hasWorkout && <div className="w-1.5 h-1.5 bg-lime-400 rounded-full mb-1"></div>}
                            {dayWeight && <span className="text-[8px] font-black text-blue-400">{dayWeight}kg</span>}
                        </div>
                    );
                }
                return days;
            };

            const calculateScore = (workout) => {
                let score = 0;
                let totalVolume = 0;
                const completedWorkout = workout.filter(ex => ex.sets.some(s => s.completed));
                if (completedWorkout.length === 0) return 0;

                workout.forEach(ex => {
                    const metric = EXERCISE_METRICS[ex.name] || { efficiency: 70 };
                    const completedSets = ex.sets.filter(s => s.completed);
                    score += (completedSets.length / (ex.sets.length || 1)) * (40 / workout.length);
                    score += (metric.efficiency / 100) * (30 / workout.length);
                    completedSets.forEach(s => totalVolume += (parseFloat(s.weight) || 0) * (parseInt(s.reps) || 0));
                });
                return Math.min(100, Math.round(score + Math.min(30, (totalVolume / (profile.weight * 80)) * 30)));
            };

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans pb-32 max-w-md mx-auto relative overflow-x-hidden border-x border-slate-900 shadow-2xl">
                    <header className="p-5 bg-slate-900/95 backdrop-blur-md border-b border-slate-800 flex justify-between items-center sticky top-0 z-40">
                        <div>
                            <h1 className="text-xl font-black text-lime-400 italic tracking-tight uppercase flex items-center gap-2">
                                LMU PRO OS <Sparkles size={16} />
                            </h1>
                            <p className="text-[8px] text-slate-500 font-bold tracking-[0.2em] uppercase text-center">AI Powered Growth</p>
                        </div>
                        <button onClick={() => setActiveTab('profile')} className="w-10 h-10 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center hover:border-lime-400 transition-colors shadow-lg">
                            <Settings size={18} className="text-slate-400" />
                        </button>
                    </header>

                    <main className="p-4 space-y-6">
                        {activeTab === 'today' && (
                            <div className="space-y-6">
                                {!selectedRoutine ? (
                                    <>
                                        {coachingTip && (
                                            <div className="bg-lime-400/10 border border-lime-400/30 p-5 rounded-[2rem] shadow-xl">
                                                <div className="flex items-center gap-2 mb-2 text-lime-400 font-black text-xs uppercase tracking-widest">
                                                    <BrainCircuit size={14} /> Coach's Note
                                                </div>
                                                <p className="text-xs text-slate-300 leading-relaxed italic">"{coachingTip}"</p>
                                            </div>
                                        )}
                                        <div className="grid grid-cols-1 gap-4">
                                            <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 shadow-xl space-y-5">
                                                <div className="flex justify-between items-center">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center"><Droplets className="text-blue-400" size={20} /></div>
                                                        <div>
                                                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Hydration</h3>
                                                            <div className="text-2xl font-black italic">{(waterLogs[todayKey] || 0)} <span className="text-sm text-slate-600 font-normal">ml</span></div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <button onClick={() => addWater(250)} className="bg-blue-500/10 border border-blue-500/20 text-blue-400 py-3 rounded-2xl text-xs font-black transition-all active:scale-95">+ 250ml</button>
                                                    <button onClick={() => addWater(500)} className="bg-blue-500/10 border border-blue-500/20 text-blue-400 py-3 rounded-2xl text-xs font-black transition-all active:scale-95">+ 500ml</button>
                                                </div>
                                            </div>
                                            <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 flex justify-between items-center shadow-xl">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-xl bg-orange-400/10 flex items-center justify-center"><Flame className="text-orange-400" size={20} /></div>
                                                    <div>
                                                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Metabolic</h3>
                                                        <div className="text-2xl font-black italic">{todayFoodTotal.kcal} <span className="text-sm text-slate-600 font-normal">kcal</span></div>
                                                    </div>
                                                </div>
                                                <button onClick={() => setActiveTab('diet')} className="bg-orange-400 text-slate-950 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Add Food</button>
                                            </div>
                                        </div>
                                        <div className="space-y-3">
                                            {Object.keys(DEFAULT_ROUTINES).map(name => (
                                                <button key={name} onClick={() => {
                                                    setSelectedRoutine(name);
                                                    setWorkoutData(DEFAULT_ROUTINES[name].map(ex => ({ name: ex, sets: Array.from({ length: 4 }, () => ({ weight: '', reps: '', completed: false })) })));
                                                }} className="w-full p-6 bg-slate-900 border border-slate-800 rounded-[2rem] flex justify-between items-center group shadow-xl">
                                                    <span className="font-black text-lg group-hover:text-lime-400 italic uppercase">{name}</span>
                                                    <ChevronRight size={24} className="text-slate-700 group-hover:text-lime-400" />
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-6">
                                        <button onClick={() => setSelectedRoutine(null)} className="p-2 bg-slate-900 rounded-xl border border-slate-800"><ChevronLeft size={20}/></button>
                                        {workoutData.map((ex, exIdx) => (
                                            <div key={exIdx} className="bg-slate-900 rounded-[2rem] border border-slate-800 overflow-hidden shadow-2xl">
                                                <div className="bg-slate-800/50 p-5 font-black text-sm uppercase italic flex justify-between">
                                                    <span>{ex.name}</span>
                                                    <button onClick={() => setWorkoutData(workoutData.filter((_, i) => i !== exIdx))}><X size={16}/></button>
                                                </div>
                                                <div className="p-4 space-y-3">
                                                    {ex.sets.map((set, setIdx) => (
                                                        <div key={setIdx} className="flex items-center gap-2">
                                                            <span className="w-8 text-[10px] font-black text-slate-700 text-center">{setIdx+1}</span>
                                                            <input type="number" placeholder="kg" value={set.weight} onChange={e => {
                                                                const d = [...workoutData]; d[exIdx].sets[setIdx].weight = e.target.value; setWorkoutData(d);
                                                            }} className="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 text-center text-xs font-bold outline-none focus:border-lime-400" />
                                                            <input type="number" placeholder="회" value={set.reps} onChange={e => {
                                                                const d = [...workoutData]; d[exIdx].sets[setIdx].reps = e.target.value; setWorkoutData(d);
                                                            }} className="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 text-center text-xs font-bold outline-none focus:border-lime-400" />
                                                            <button onClick={() => {
                                                                const d = [...workoutData]; d[exIdx].sets[setIdx].completed = !d[exIdx].sets[setIdx].completed; setWorkoutData(d);
                                                            }} className={`w-11 h-11 flex items-center justify-center rounded-xl ${set.completed ? 'bg-lime-400 text-slate-950' : 'bg-slate-800 text-slate-600'}`}>
                                                                <CheckCircle2 size={20} />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={() => setIsAddingExercise(true)} className="w-full py-4 border-2 border-dashed border-slate-800 rounded-2xl text-[10px] font-black text-slate-500 uppercase tracking-widest">+ Add Exercise</button>
                                        <button onClick={() => {
                                            const score = calculateScore(workoutData);
                                            setSavedLogs([{ id: Date.now(), date: todayKey, routine: selectedRoutine, weight: profile.weight, exercises: workoutData, score }, ...savedLogs]);
                                            generateCoachingTip(workoutData);
                                            setSelectedRoutine(null);
                                            setActiveTab('history');
                                        }} className="w-full bg-lime-400 text-slate-950 py-5 rounded-[2rem] font-black text-lg shadow-2xl italic uppercase tracking-tighter">Mission Accomplished</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'diet' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-black uppercase italic tracking-tighter">AI Nutrition</h2>
                                <div className="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 text-center space-y-6 shadow-2xl">
                                    <div className="text-4xl font-black text-lime-400 italic">{todayFoodTotal.kcal} / {dietGoal.targetKcal} kcal</div>
                                    <div className="space-y-4 pt-2">
                                        {[{l:"Carbs",c:todayFoodTotal.carbs,g:dietGoal.carbs,clr:"bg-slate-500"},{l:"Protein",c:todayFoodTotal.protein,g:dietGoal.protein,clr:"bg-blue-400"},{l:"Fat",c:todayFoodTotal.fat,g:dietGoal.fat,clr:"bg-orange-500"}].map((item, idx) => (
                                            <div key={`nutrient-${idx}`} className="space-y-1">
                                                <div className="flex justify-between text-[10px] font-black uppercase px-1"><span className="text-slate-500">{item.l}</span><span>{item.c} / {item.g}g</span></div>
                                                <div className="bg-slate-800 h-1.5 rounded-full overflow-hidden"><div className={`${item.clr} h-full transition-all duration-1000`} style={{width:`${Math.min(100,(item.c/item.g)*100)}%`}}></div></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={generateMealSuggestion} className="w-full py-4 bg-slate-900 border border-lime-400/20 rounded-2xl text-[10px] font-black text-lime-400 uppercase tracking-widest flex items-center justify-center gap-2 shadow-xl">
                                    <Sparkles size={14} /> ✨ AI 식단 추천받기
                                </button>
                                {mealSuggestion && <div className="p-4 bg-slate-900/50 rounded-2xl text-xs italic text-slate-400">"{mealSuggestion}"</div>}
                            </div>
                        )}

                        {activeTab === 'calendar' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-black uppercase italic tracking-tighter">Performance Map</h2>
                                <div className="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
                                    <div className="grid grid-cols-7 bg-slate-800/40 border-b border-slate-800">
                                        {['S','M','T','W','T','F','S'].map((day, idx) => (
                                            <div key={`cal-header-${idx}`} className="py-3 text-center text-[10px] font-black text-slate-600">{day}</div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-7">
                                        {renderCalendar()}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-black uppercase italic tracking-tighter">Mission Archives</h2>
                                {savedLogs.map(log => (
                                    <div key={log.id} className="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-6 relative overflow-hidden shadow-2xl">
                                        <div className="absolute top-0 right-0 w-16 h-16 bg-lime-400/10 flex items-center justify-center font-black text-lime-400 text-2xl italic border-l border-b border-slate-800">{log.score}</div>
                                        <div className="text-[10px] font-black text-slate-600 mb-1 uppercase tracking-tight">{log.date} ({log.weight}kg)</div>
                                        <h3 className="font-black text-xl mb-4 italic uppercase">{log.routine}</h3>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'profile' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-black uppercase italic tracking-tighter text-center">System Config</h2>
                                <div className="bg-slate-900 p-8 rounded-[3rem] border border-slate-800 space-y-6 shadow-2xl">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Weight (kg)</label>
                                        <input type="number" step="0.1" value={profile.weight} onChange={e => setProfile({...profile, weight: parseFloat(e.target.value) || 0})} className="w-full bg-slate-950 border border-slate-800 rounded-[1.5rem] py-4 px-6 text-3xl font-black text-lime-400 outline-none focus:border-lime-400 shadow-inner" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-slate-900/95 backdrop-blur-3xl border border-slate-800 p-2.5 rounded-[2.5rem] flex justify-around items-center z-50 shadow-[0_30px_60px_rgba(0,0,0,0.6)]">
                        {[
                            { id: 'today', icon: 'Dumbbell', label: "Train" },
                            { id: 'diet', icon: 'Utensils', label: "Eat" },
                            { id: 'calendar', icon: 'CalendarIcon', label: "Map" },
                            { id: 'history', icon: 'Award', label: "Logs" }
                        ].map(tab => (
                            <button 
                                key={`nav-${tab.id}`} 
                                onClick={() => setActiveTab(tab.id)} 
                                className={`flex flex-col items-center gap-1.5 px-6 py-3.5 rounded-3xl transition-all duration-300 ${activeTab === tab.id ? 'bg-lime-400 text-slate-950 scale-105 shadow-[0_0_20px_rgba(163,230,53,0.3)]' : 'text-slate-600'}`}
                            >
                                <div className="p-1 flex items-center justify-center">
                                    {tab.icon === 'Dumbbell' && <Dumbbell size={20} />}
                                    {tab.icon === 'Utensils' && <Utensils size={20} />}
                                    {tab.icon === 'CalendarIcon' && <CalendarIcon size={20} />}
                                    {tab.icon === 'Award' && <Award size={20} />}
                                </div>
                                <span className="text-[8px] font-black uppercase tracking-widest">{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                    {isAddingExercise && (
                        <div className="fixed inset-0 bg-slate-950/98 z-[100] p-8 animate-in fade-in zoom-in-95 overflow-y-auto no-scrollbar">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-3xl font-black italic tracking-tighter uppercase italic">Add Module</h2>
                                <button onClick={() => setIsAddingExercise(false)} className="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center shadow-lg"><X size={24}/></button>
                            </div>
                            <div className="bg-slate-900 p-5 rounded-3xl flex items-center gap-4 mb-10 border border-slate-800 shadow-inner">
                                <Search size={22} className="text-slate-600" />
                                <input type="text" placeholder="Search Module..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-transparent flex-1 outline-none text-sm font-bold placeholder-slate-700" />
                            </div>
                            <div className="space-y-4">
                                {Object.keys(EXERCISE_METRICS).filter(k => k.includes(searchQuery)).map(name => (
                                    <button key={`add-ex-${name}`} onClick={() => {
                                        setWorkoutData([...workoutData, { name, sets: Array.from({ length: 3 }, () => ({ weight: '', reps: '', completed: false })) }]);
                                        setIsAddingExercise(false);
                                    }} className="w-full p-6 bg-slate-900 border border-slate-800 rounded-[2.5rem] text-left flex justify-between items-center hover:border-lime-400 transition-all active:scale-95 shadow-xl">
                                        <div>
                                            <div className="font-black text-sm mb-1.5 uppercase italic tracking-tight">{name}</div>
                                            <div className="text-[10px] text-slate-500 font-black uppercase tracking-widest">{EXERCISE_METRICS[name].part} · EFF {EXERCISE_METRICS[name].efficiency}%</div>
                                        </div>
                                        <div className="bg-slate-800 p-2.5 rounded-xl"><Plus size={20} className="text-lime-400" /></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
